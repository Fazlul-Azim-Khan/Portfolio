name: Deploy to Firebase Hosting

# Runs on every push to the main branch.
# This is your CI/CD pipeline — every time you push a change,
# GitHub builds the site and deploys it to Firebase automatically.

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code from GitHub
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node.js 20 (matches Next.js 14 requirements)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies (clean install, same as npm install but deterministic)
      - name: Install dependencies
        run: npm ci

      # 4. Build the static export (outputs to /out folder)
      - name: Build
        run: npm run build

      # 5. Deploy the /out folder to Firebase Hosting
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: fazux-portfolio
